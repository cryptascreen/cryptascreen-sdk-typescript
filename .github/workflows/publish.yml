name: Publish to npm

# Publishes @cryptascreen/sdk to npm via OIDC Trusted Publishing.
# Requires: Trusted Publisher configured on npmjs.com for this package,
# pointing at cryptascreen/cryptascreen-sdk-typescript + workflow file "publish.yml".
# No NPM_TOKEN or other long-lived secret is required.

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (OIDC trusted publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm (OIDC)
        run: npm publish --provenance --access public
